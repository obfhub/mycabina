<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title id="page-title">Galerie — MyCabina</title>
  <meta name="description" content="Galerie foto eveniment MyCabina — amintiri instant, pentru totdeauna." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }

    :root {
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --brown: #6b3e1d;
      --brown-light: #8b5a2b;
      --brown-pale: #d8b98a;
      --cream: #f7f2ea;
      --cream-dark: #eee4d2;
      --ink: #1a140e;
      --ink-mid: #4b3a2a;
      --ink-soft: #8c7a63;
      --white: #ffffff
    }

    html { scroll-behavior: smooth }

    body {
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
      min-height: 100dvh
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: .35
    }

    /* ─── NAV ─── */
    nav {
      position: fixed;
      top: env(safe-area-inset-top);
      left: 0; right: 0;
      z-index: 900;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2.5rem;
      height: 60px;
      transition: background .4s, backdrop-filter .4s, box-shadow .4s
    }
    nav.scrolled {
      background: rgba(250, 246, 240, .92);
      backdrop-filter: blur(14px);
      box-shadow: 0 1px 0 rgba(124, 80, 26, .12)
    }
    .nav-logo {
      display: flex; align-items: center; gap: 0; text-decoration: none
    }
    .logo-icon { height: 150px; width: auto; display: block; flex-shrink: 0 }
    .logo-text {
      height: 200px; width: auto; display: block; flex-shrink: 0;
      margin-left: -150px; transform: translateY(-30px)
    }
    .nav-back {
      display: flex; align-items: center; gap: .5rem;
      font-size: .78rem; font-weight: 400; letter-spacing: .1em;
      text-transform: uppercase; text-decoration: none;
      color: var(--ink-mid); transition: color .25s
    }
    .nav-back:hover { color: var(--brown) }
    .nav-back svg { width: 16px; height: 16px }

    /* ─── HERO ─── */
    .gallery-hero {
      padding-top: calc(60px + env(safe-area-inset-top) + 5rem);
      padding-bottom: 3rem;
      text-align: center;
      position: relative
    }
    .gallery-hero::after {
      content: '';
      position: absolute;
      bottom: 0; left: 50%; transform: translateX(-50%);
      width: 40px; height: 1px; background: var(--brown-pale)
    }
    .gallery-tag {
      font-size: .7rem; letter-spacing: .18em; text-transform: uppercase;
      color: var(--brown); margin-bottom: 1rem; display: block
    }
    .gallery-title {
      font-family: var(--serif);
      font-size: clamp(2.4rem, 6vw, 4rem);
      font-weight: 300; line-height: 1.1;
      color: var(--ink); margin-bottom: .8rem
    }
    .gallery-title em { font-style: italic; color: var(--brown) }
    .gallery-meta {
      font-size: .82rem; color: var(--ink-soft);
      letter-spacing: .04em
    }
    .gallery-count { font-size: .75rem; color: var(--brown-pale); margin-left: .5rem }

    /* ─── DOWNLOAD ALL ─── */
    .dl-bar {
      display: flex; justify-content: center; gap: 1rem;
      padding: 1.5rem 2rem 2.5rem;
      flex-wrap: wrap
    }
    .btn-dl {
      display: inline-flex; align-items: center; gap: .5rem;
      font-size: .78rem; letter-spacing: .1em; text-transform: uppercase;
      font-family: var(--sans); font-weight: 400;
      text-decoration: none; cursor: pointer;
      padding: .65rem 1.5rem; border-radius: 2px;
      transition: all .25s; border: none
    }
    .btn-dl-primary {
      background: var(--brown); color: var(--white)
    }
    .btn-dl-primary:hover { background: var(--brown-light) }
    .btn-dl-ghost {
      background: transparent; color: var(--ink-mid);
      border: 1px solid var(--brown-pale)
    }
    .btn-dl-ghost:hover { border-color: var(--brown); color: var(--brown) }
    .btn-dl svg { width: 14px; height: 14px }

    /* ─── GRID ─── */
    .gallery-grid {
      column-count: 3;
      column-gap: 10px;
      padding: 0 2.5rem 5rem;
      max-width: 1400px;
      margin: 0 auto
    }

    @media (max-width: 900px) { .gallery-grid { column-count: 2 } }
    @media (max-width: 500px) {
      .gallery-grid { column-count: 2; padding: 0 1rem 4rem; column-gap: 6px }
    }

    .gallery-item {
      break-inside: avoid;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden;
      border-radius: 2px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity .5s ease, transform .5s ease
    }
    @media (max-width: 500px) { .gallery-item { margin-bottom: 6px } }

    .gallery-item.visible { opacity: 1; transform: translateY(0) }

    .gallery-item img {
      width: 100%; display: block;
      transition: transform .6s ease
    }
    .gallery-item:hover img { transform: scale(1.04) }

    .gallery-item-overlay {
      position: absolute; inset: 0;
      background: rgba(26, 20, 14, 0);
      display: flex; align-items: flex-end; justify-content: flex-end;
      padding: .6rem;
      transition: background .3s
    }
    .gallery-item:hover .gallery-item-overlay {
      background: rgba(26, 20, 14, .22)
    }
    .item-dl-btn {
      opacity: 0; transform: translateY(4px);
      background: rgba(255,255,255,.9);
      border: none; border-radius: 2px;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: opacity .25s, transform .25s, background .2s;
      color: var(--brown);
      text-decoration: none
    }
    .gallery-item:hover .item-dl-btn {
      opacity: 1; transform: translateY(0)
    }
    .item-dl-btn:hover { background: var(--white) }
    .item-dl-btn svg { width: 14px; height: 14px }

    /* ─── LIGHTBOX ─── */
    .lightbox {
      position: fixed; inset: 0; z-index: 9000;
      background: rgba(26, 20, 14, .96);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s
    }
    .lightbox.open { opacity: 1; pointer-events: all }

    .lightbox-img {
      max-width: min(92vw, 1100px);
      max-height: 90dvh;
      object-fit: contain;
      border-radius: 2px;
      display: block;
      transform: scale(.96);
      transition: transform .3s
    }
    .lightbox.open .lightbox-img { transform: scale(1) }

    .lb-close {
      position: absolute; top: 1.2rem; right: 1.5rem;
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,.6); font-size: 1.8rem; line-height: 1;
      transition: color .2s
    }
    .lb-close:hover { color: var(--white) }

    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
      color: rgba(255,255,255,.7);
      font-size: 1.4rem;
      width: 44px; height: 44px;
      border-radius: 2px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background .2s, color .2s
    }
    .lb-nav:hover { background: rgba(255,255,255,.18); color: var(--white) }
    .lb-prev { left: 1.2rem }
    .lb-next { right: 1.2rem }

    .lb-counter {
      position: absolute; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      font-size: .72rem; letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.4)
    }
    .lb-dl {
      position: absolute; bottom: 1.4rem; right: 1.5rem;
      display: flex; align-items: center; gap: .4rem;
      font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
      color: rgba(255,255,255,.5); text-decoration: none;
      transition: color .2s
    }
    .lb-dl:hover { color: rgba(255,255,255,.9) }
    .lb-dl svg { width: 13px; height: 13px }

    /* ─── EMPTY STATE ─── */
    .gallery-empty {
      text-align: center;
      padding: 5rem 2rem;
      color: var(--ink-soft)
    }
    .gallery-empty svg {
      width: 48px; height: 48px; margin: 0 auto 1.5rem;
      stroke: var(--brown-pale); display: block
    }
    .gallery-empty h3 {
      font-family: var(--serif); font-size: 1.6rem;
      font-weight: 300; margin-bottom: .6rem; color: var(--ink-mid)
    }
    .gallery-empty p { font-size: .9rem; line-height: 1.6 }

    /* ─── NOT FOUND ─── */
    .gallery-not-found {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60dvh; text-align: center;
      padding: 2rem
    }
    .gallery-not-found .err-code {
      font-family: var(--serif); font-size: clamp(5rem, 15vw, 9rem);
      color: var(--brown-pale); font-weight: 300; line-height: 1
    }
    .gallery-not-found h2 {
      font-family: var(--serif); font-size: 1.8rem;
      font-weight: 300; margin: .5rem 0 1rem; color: var(--ink-mid)
    }
    .gallery-not-found p { font-size: .9rem; color: var(--ink-soft); margin-bottom: 2rem }

    /* ─── LOADING ─── */
    .gallery-loading {
      display: flex; align-items: center; justify-content: center;
      min-height: 40dvh; gap: .6rem;
      color: var(--ink-soft); font-size: .85rem
    }
    .loading-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--brown-pale);
      animation: pulse 1.2s ease-in-out infinite
    }
    .loading-dot:nth-child(2) { animation-delay: .2s }
    .loading-dot:nth-child(3) { animation-delay: .4s }
    @keyframes pulse {
      0%, 80%, 100% { opacity: .3; transform: scale(1) }
      40% { opacity: 1; transform: scale(1.4) }
    }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--cream-dark);
      padding: 2rem;
      display: flex; align-items: center; justify-content: center;
      gap: 1rem; flex-wrap: wrap
    }
    .footer-copy {
      font-size: .72rem; color: var(--ink-soft); letter-spacing: .06em;
      text-align: center
    }
    .footer-home {
      font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--brown); text-decoration: none;
      transition: opacity .2s
    }
    .footer-home:hover { opacity: .7 }

    /* ─── REVEAL ─── */
    .reveal { opacity: 0; transform: translateY(20px); transition: opacity .6s ease, transform .6s ease }
    .reveal.visible { opacity: 1; transform: none }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="navbar">
  <a href="/" class="nav-logo">
    <img class="logo-icon" src="/doarcabina.svg" alt="MyCabina" />
    <img class="logo-text" src="/mycabinatext.svg" alt="" />
  </a>
  <a href="/" class="nav-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    Acasă
  </a>
</nav>

<!-- MAIN CONTENT -->
<main id="main"></main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" role="dialog" aria-modal="true">
  <button class="lb-close" id="lbClose" aria-label="Închide">&#215;</button>
  <button class="lb-nav lb-prev" id="lbPrev" aria-label="Anterior">&#8249;</button>
  <img class="lightbox-img" id="lbImg" src="" alt="Fotografie eveniment" />
  <button class="lb-nav lb-next" id="lbNext" aria-label="Următor">&#8250;</button>
  <span class="lb-counter" id="lbCounter"></span>
  <a class="lb-dl" id="lbDl" href="#" download>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/>
      <line x1="12" y1="15" x2="12" y2="3"/>
    </svg>
    Descarcă
  </a>
</div>

<footer>
  <span class="footer-copy">© 2026 MyCabina. Amintiri instant, pentru totdeauna.</span>
  <a href="/" class="footer-home">mycabina.com</a>
</footer>

<script>
(async () => {
  const main = document.getElementById('main');
  
  // Extract folder from URL: /galerie/FOLDERNAME
  const segments = location.pathname.split('/').filter(Boolean);
  const folder = segments[1]; // ['galerie', 'foldername']

  if (!folder) {
    renderNotFound('Nicio galerie specificată');
    return;
  }

  // Show loading
  main.innerHTML = `
    <div class="gallery-loading">
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
      <div class="loading-dot"></div>
    </div>`;

  let data;
  try {
    const res = await fetch(`/api/galerie/${encodeURIComponent(folder)}`);
    if (res.status === 404) { renderNotFound(); return; }
    if (!res.ok) throw new Error('Server error');
    data = await res.json();
  } catch (e) {
    renderNotFound('Nu s-a putut încărca galeria.');
    return;
  }

  const { title, eventDate, photoCount, photos } = data;

  // Update page title
  document.getElementById('page-title').textContent = `${title} — MyCabina`;

  // Render
  const dateStr = eventDate
    ? new Date(eventDate).toLocaleDateString('ro-RO', { day: 'numeric', month: 'long', year: 'numeric' })
    : '';

  main.innerHTML = `
    <section class="gallery-hero">
      <span class="gallery-tag reveal">Galerie foto</span>
      <h1 class="gallery-title reveal">${escHtml(title)}<br><em>Amintiri</em></h1>
      <p class="gallery-meta reveal">
        ${dateStr}
        <span class="gallery-count">${photoCount} fotografii</span>
      </p>
    </section>

    <div class="dl-bar reveal">
      <a class="btn-dl btn-dl-primary" href="/api/galerie/${encodeURIComponent(folder)}/download" id="dlAll">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Descarcă toate (${photoCount})
      </a>
      <button class="btn-dl btn-dl-ghost" onclick="shareGallery()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Distribuie
      </button>
    </div>

    <div class="gallery-grid" id="galleryGrid">
      ${photos.length === 0 ? `
        <div class="gallery-empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3">
            <rect x="3" y="3" width="18" height="18" rx="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <h3>Fotografiile sosesc curând</h3>
          <p>Galeria va fi disponibilă după eveniment.</p>
        </div>
      ` : photos.map((p, i) => `
        <div class="gallery-item" data-index="${i}" onclick="openLightbox(${i})">
          <img src="${escHtml(p.url)}" alt="Fotografie ${i+1}" loading="lazy" />
          <div class="gallery-item-overlay">
            <a class="item-dl-btn" href="${escHtml(p.url)}" download onclick="e=>e.stopPropagation()" title="Descarcă">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </a>
          </div>
        </div>
      `).join('')}
    </div>`;

  // Intersection observer for reveal
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.08 });

  document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

  // Staggered gallery items
  const items = document.querySelectorAll('.gallery-item');
  const gridObserver = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = +e.target.dataset.index;
        setTimeout(() => e.target.classList.add('visible'), (idx % 9) * 60);
        gridObserver.unobserve(e.target);
      }
    });
  }, { threshold: 0.05 });
  items.forEach(el => gridObserver.observe(el));

  // Setup lightbox data
  window._photos = photos;

  // Nav scroll
  const navbar = document.getElementById('navbar');
  window.addEventListener('scroll', () => {
    navbar.classList.toggle('scrolled', scrollY > 40);
  });

})();

// ── Lightbox ──────────────────────────────────────────────
let lbIndex = 0;

function openLightbox(i) {
  lbIndex = i;
  updateLb();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLb() {
  const photos = window._photos || [];
  if (!photos.length) return;
  const p = photos[lbIndex];
  document.getElementById('lbImg').src = p.url;
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${photos.length}`;
  document.getElementById('lbDl').href = p.url;
  document.getElementById('lbDl').download = p.filename || `foto-${lbIndex + 1}.jpg`;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => {
  const photos = window._photos || [];
  lbIndex = (lbIndex - 1 + photos.length) % photos.length;
  updateLb();
});
document.getElementById('lbNext').addEventListener('click', () => {
  const photos = window._photos || [];
  lbIndex = (lbIndex + 1) % photos.length;
  updateLb();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb.classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') document.getElementById('lbPrev').click();
  if (e.key === 'ArrowRight') document.getElementById('lbNext').click();
});

// ── Share ──────────────────────────────────────────────────
function shareGallery() {
  if (navigator.share) {
    navigator.share({ title: document.title, url: location.href });
  } else {
    navigator.clipboard.writeText(location.href).then(() => {
      const btn = document.querySelector('.btn-dl-ghost');
      const orig = btn.innerHTML;
      btn.innerHTML = '✓ Link copiat!';
      setTimeout(() => btn.innerHTML = orig, 2000);
    });
  }
}

// ── Not found ──────────────────────────────────────────────
function renderNotFound(msg = 'Galeria nu există sau a fost ștearsă.') {
  const main = document.getElementById('main');
  main.innerHTML = `
    <div class="gallery-not-found">
      <div class="err-code">404</div>
      <h2>Galerie inexistentă</h2>
      <p>${escHtml(msg)}</p>
      <a href="/" class="btn-dl btn-dl-primary">Înapoi acasă</a>
    </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
