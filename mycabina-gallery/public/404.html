<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Galerie negăsită — MyCabina</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=DM+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
      --brown: #6b3e1d; --cream: #f7f2ea; --ink-soft: #8c7a63;
    }
    body {
      font-family: var(--sans);
      background: var(--cream);
      display: flex; align-items: center; justify-content: center;
      min-height: 100dvh; text-align: center; padding: 2rem;
    }
    h1 { font-family: var(--serif); font-size: 4rem; font-weight: 300; color: var(--brown); }
    p { color: var(--ink-soft); margin-top: 1rem; font-size: .9rem; }
    a { color: var(--brown); text-decoration: none; display: inline-block; margin-top: 1.5rem;
        font-size: .78rem; letter-spacing: .1em; text-transform: uppercase;
        border-bottom: 1px solid; padding-bottom: 2px; }
  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Galeria nu a fost găsită.<br/>Verifică link-ul sau contactează organizatorul.</p>
    <a href="https://mycabina.com">← mycabina.com</a>
  </div>
</body>
</html>
